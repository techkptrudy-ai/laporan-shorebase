<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASDP Shorebase v16.5 - Cloud Storage</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --asdp-blue: #0054a6; --asdp-orange: #f26522; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f4f8; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h2 { color: var(--asdp-blue); font-size: 1rem; border-left: 4px solid var(--asdp-orange); padding-left: 10px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .btn { padding: 15px; border: none; border-radius: 8px; font-weight: bold; width: 100%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
        .btn-save { background: var(--asdp-blue); }
        .btn-pdf { background: var(--asdp-orange); }
        #loading { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:10000; flex-direction:column; align-items:center; justify-content:center; }
        .recent-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        .recent-table td { padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div id="loading">
    <i class="fas fa-cloud-upload-alt fa-spin fa-3x" style="color:var(--asdp-blue)"></i>
    <p id="loadText" style="margin-top:15px; font-weight:bold;">Mengirim ke Cloud...</p>
</div>

<div class="container">
    <div class="card">
        <h2>INPUT HARIAN</h2>
        <input type="date" id="tgl">
        <select id="lok">
            <option>KMP.Batumandi</option><option>KMP.Sebuku</option><option>KMP.Legundi</option>
            <option>KMP.Jatra 3</option><option>KMP.Portlink</option><option>Workshop</option>
        </select>
        <textarea id="akt" rows="3" placeholder="Uraian pekerjaan..."></textarea>
        <input type="file" id="foto" accept="image/*" onchange="compressImage(this)">
        <button class="btn btn-save" onclick="simpanData()"><i class="fas fa-paper-plane"></i> SIMPAN KE GOOGLE SHEETS</button>
    </div>

    <div class="card">
        <h2>CETAK PDF (LOKAL)</h2>
        <p style="font-size: 10px; color: #666;">PDF ini untuk laporan harian di HP. Data lengkap + Foto tersimpan permanen di Google Sheets Bapak.</p>
        <button class="btn btn-pdf" onclick="cetakPDF()"><i class="fas fa-file-pdf"></i> DOWNLOAD PDF</button>
    </div>

    <div class="card">
        <h2>RIWAYAT INPUT</h2>
        <table class="recent-table" id="historyTable"></table>
    </div>
</div>

<script>
    // --- PENTING: PASTE WEB APP URL BAPAK DI SINI ---
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxAgBYFtBpttvZ4wOpmgM1azCFHlUHcMYWSgcRYm6LIudjCn_XDqNb97oXSUG6nUBj-Ug/exec"; 

    let db = JSON.parse(localStorage.getItem('asdp_cloud_v1')) || [];
    let currentImg = "";

    document.getElementById('tgl').valueAsDate = new Date();
    updateTable();

    function compressImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.src = e.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const maxW = 400;
                    const scale = maxW / img.width;
                    canvas.width = maxW;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    currentImg = canvas.toDataURL('image/jpeg', 0.6);
                };
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function simpanData() {
        const akt = document.getElementById('akt').value;
        if(!akt) return alert("Uraian pekerjaan harus diisi!");
        
        const data = {
            tgl: document.getElementById('tgl').value,
            lok: document.getElementById('lok').value,
            akt: akt,
            stat: "Selesai",
            foto: currentImg
        };

        document.getElementById('loading').style.display = "flex";
        
        try {
            // Kirim data ke Google Apps Script (Cloud)
            await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(data)
            });

            // Simpan teks saja di HP agar tidak penuh (foto dihapus dari memori HP)
            const dataLokal = {...data, foto: ""}; 
            db.push(dataLokal);
            localStorage.setItem('asdp_cloud_v1', JSON.stringify(db));
            
            alert("Berhasil! Data masuk ke Sheets & Foto masuk ke Drive.");
            location.reload();
        } catch (e) {
            alert("Gagal kirim ke Cloud. Cek koneksi internet Bapak.");
        } finally {
            document.getElementById('loading').style.display = "none";
        }
    }

    function updateTable() {
        const table = document.getElementById('historyTable');
        table.innerHTML = "";
        db.slice().reverse().forEach((d) => {
            table.innerHTML += `<tr><td><b>${d.lok}</b><br><small>${d.tgl}</small></td><td align="right"><i class="fas fa-cloud-done" style="color:blue"></i></td></tr>`;
        });
    }

    function cetakPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("Laporan Shorebase ASDP", 14, 15);
        // PDF ini hanya berisi teks riwayat input hari ini
        const rows = db.map((d, i) => [i + 1, d.tgl, d.lok, d.akt]);
        doc.autoTable({ head: [['No', 'Tgl', 'Unit', 'Pekerjaan']], body: rows, startY: 20 });
        doc.save("Laporan_Harian.pdf");
    }
</script>
</body>
</html>
