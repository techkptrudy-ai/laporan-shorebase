<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASDP Shorebase v19.1 - Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --asdp-blue: #0054a6; 
            --asdp-orange: #f26522;
            --bg-body: #f0f4f8;
            --bg-card: #ffffff;
            --text-main: #333333;
            --text-label: #666666;
            --border-color: #dddddd;
            --input-bg: #ffffff;
            --navbar-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg-body: #121826;
            --bg-card: #1e2533;
            --text-main: #e0e6ed;
            --text-label: #a0aec0;
            --border-color: #2d3748;
            --input-bg: #2d3748;
            --navbar-bg: #1e2533;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg-body); color: var(--text-main); transition: 0.3s; }
        .navbar { background: var(--navbar-bg); padding: 10px 20px; border-bottom: 4px solid var(--asdp-blue); position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: var(--bg-card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        h2 { margin-top: 0; color: var(--asdp-blue); font-size: 1rem; border-left: 4px solid var(--asdp-orange); padding-left: 10px; text-transform: uppercase; }
        label { display: block; margin-top: 12px; font-weight: bold; font-size: 0.75rem; color: var(--text-label); }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid var(--border-color); border-radius: 10px; font-size: 15px; box-sizing: border-box; background: var(--input-bg); color: var(--text-main); }
        
        .theme-toggle { cursor: pointer; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--asdp-blue); color: white; border: none; }
        
        .photo-options { display: flex; gap: 10px; margin-top: 8px; }
        .btn-opt { flex: 1; padding: 12px; border: 1px solid var(--border-color); border-radius: 10px; background: var(--input-bg); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 0.75rem; color: var(--text-label); transition: 0.3s; }
        .btn-opt i { font-size: 1.2rem; color: var(--asdp-blue); }

        .btn { padding: 15px; border: none; border-radius: 10px; font-size: 0.9rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; color: white; }
        .btn-save { background: var(--asdp-blue); }
        .btn-update { background: #28a745; }
        .btn-pdf { background: var(--asdp-orange); }
        .btn-setup { background: var(--input-bg); color: var(--text-main); font-size: 0.7rem; border: 1px dashed var(--border-color); padding: 8px; }
        
        #preview-img { width: 100%; max-width: 180px; border-radius: 10px; margin-top: 15px; display: none; border: 2px solid var(--border-color); }
        .preview-setup { height: 45px; object-fit: contain; margin-top: 5px; display: none; border: 1px solid var(--border-color); background: white; padding: 2px; }
        
        .recent-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.75rem; color: var(--text-main); }
        .btn-edit-inline { color: var(--asdp-blue); cursor: pointer; font-size: 1.1rem; padding: 5px; margin-left: 10px; }
        .btn-delete-inline { color: #dc3545; cursor: pointer; font-size: 1.1rem; padding: 5px; }
        
        #loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center; flex-direction: column; color: white; }
        .btn-clear-all { background: #fbe9e7; color: #d32f2f; border: 1px solid #ffccbc; padding: 8px; font-size: 0.7rem; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 15px; font-weight: bold; }
        [data-theme="dark"] .btn-clear-all { background: #3d2222; color: #ff8a80; border-color: #5d3535; }
    </style>
</head>
<body>

<div id="loading">
    <i class="fas fa-sync fa-spin fa-3x" style="color: var(--asdp-orange);"></i>
    <p style="margin-top:15px; font-weight: bold; letter-spacing: 1px;">FINALISASI PDF...</p>
</div>

<div class="navbar">
    <div>
        <b style="color:var(--asdp-blue); font-size: 13px;"><i class="fas fa-ship"></i> ASDP SHOREBASE PRO</b>
        <span style="font-size: 9px; color: #aaa; background: rgba(0,0,0,0.05); padding: 2px 5px; border-radius: 5px;">v19.1</span>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">
        <i class="fas fa-moon"></i>
    </button>
</div>

<div class="container">
    <div class="card">
        <h2 id="form-title"><i class="fas fa-edit"></i> Form Pekerjaan</h2>
        <input type="hidden" id="edit-id"> <label>Hari & Tanggal</label>
        <input type="date" id="tgl">
        
        <label>Unit / Kapal</label>
        <select id="lok">
            <option>KMP.Batumandi</option><option>KMP.Sebuku</option><option>KMP.Legundi</option>
            <option>KMP.Jatra 3</option><option>KMP.Portlink</option><option>KMP.Portlink 3</option>
            <option>KMP.Portlink 5</option><option>Workshop</option><option>Dinas Luar</option>
        </select>

        <label>Status Pekerjaan</label>
        <select id="status">
            <option value="Selesai">Selesai</option>
            <option value="Pending">Pending</option>
            <option value="Lanjut">Lanjut</option>
        </select>
        
        <label>Uraian Pekerjaan (Detail)</label>
        <textarea id="akt" rows="4" placeholder="Detail teknis pekerjaan..."></textarea>
        
        <label>Dokumentasi Foto</label>
        <div class="photo-options">
            <div class="btn-opt" onclick="document.getElementById('cam').click()">
                <i class="fas fa-camera"></i><span>Ambil Foto</span>
            </div>
            <div class="btn-opt" onclick="document.getElementById('gal').click()">
                <i class="fas fa-images"></i><span>Buka Galeri</span>
            </div>
        </div>
        <input type="file" id="cam" accept="image/*" capture="camera" style="display:none" onchange="processFile(this, 'foto')">
        <input type="file" id="gal" accept="image/*" style="display:none" onchange="processFile(this, 'foto')">
        
        <center><img id="preview-img"></center>
        
        <button id="btn-main" class="btn btn-save" onclick="saveData()">
            <i class="fas fa-save"></i> SIMPAN DATA
        </button>
        <button id="btn-cancel" class="btn" style="background:#666; display:none;" onclick="resetForm()">
            BATAL EDIT
        </button>
    </div>

    <div class="card" style="border: 1px solid var(--asdp-orange);">
        <h2><i class="fas fa-user-cog"></i> Setup Atribut</h2>
        <label>Logo ASDP</label>
        <input type="file" accept="image/*" onchange="processFile(this, 'logo_site')" class="btn-setup">
        <center><img id="p-logo" class="preview-setup"></center>

        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <div style="flex: 1;">
                <label>TTD Syahrudi</label>
                <input type="file" accept="image/*" onchange="processFile(this, 'ttd_user')" class="btn-setup">
                <center><img id="p-ttd-user" class="preview-setup"></center>
            </div>
            <div style="flex: 1;">
                <label>TTD Manager</label>
                <input type="file" accept="image/*" onchange="processFile(this, 'ttd_mgr')" class="btn-setup">
                <center><img id="p-ttd-mgr" class="preview-setup"></center>
            </div>
        </div>
    </div>

    <div class="card">
        <button class="btn btn-pdf" onclick="generateMegaPDF()">
            <i class="fas fa-file-pdf"></i> CETAK LAPORAN PRO
        </button>
        <table class="recent-table" id="historyTable"></table>
        <div id="clear-container"></div>
    </div>
    
    <div style="text-align: center; color: #bbb; font-size: 10px; margin-bottom: 30px;">
        &copy; 2026 OBOTECH DIGITAL SYSTEM
    </div>
</div>

<script>
    let db;
    let imgLogo = "", imgTTDUser = "", imgTTDMgr = "", tempFoto = "";

    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute("data-theme");
        const newTheme = currentTheme === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
        updateThemeIcon(newTheme);
    }

    function updateThemeIcon(theme) {
        const btn = document.getElementById('theme-btn');
        btn.innerHTML = theme === "dark" ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        btn.style.background = theme === "dark" ? 'var(--asdp-orange)' : 'var(--asdp-blue)';
    }

    const savedTheme = localStorage.getItem("theme") || "light";
    document.documentElement.setAttribute("data-theme", savedTheme);
    updateThemeIcon(savedTheme);

    const request = indexedDB.open("ShorebaseDB_v19_1", 1);
    request.onupgradeneeded = e => {
        let dbEx = e.target.result;
        dbEx.createObjectStore("laporan", { keyPath: "id", autoIncrement: true });
        dbEx.createObjectStore("settings", { keyPath: "key" });
    };
    request.onsuccess = e => {
        db = e.target.result;
        loadSettings();
        refreshTable();
    };

    function formatIndo(dateStr) {
        if(!dateStr) return "-";
        const opsi = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
        return new Date(dateStr).toLocaleDateString('id-ID', opsi);
    }

    function processFile(input, type) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = (type === 'foto') ? 700 : 400;
                    canvas.height = img.height * (canvas.width / img.width);
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const base64 = canvas.toDataURL('image/png');
                    if(type === 'foto') { 
                        tempFoto = base64; 
                        document.getElementById('preview-img').src = base64; 
                        document.getElementById('preview-img').style.display = "block"; 
                    } else {
                        db.transaction("settings", "readwrite").objectStore("settings").put({key: type, val: base64});
                        if(type === 'logo_site') { imgLogo = base64; document.getElementById('p-logo').src = base64; document.getElementById('p-logo').style.display = "block"; }
                        if(type === 'ttd_user') { imgTTDUser = base64; document.getElementById('p-ttd-user').src = base64; document.getElementById('p-ttd-user').style.display = "block"; }
                        if(type === 'ttd_mgr') { imgTTDMgr = base64; document.getElementById('p-ttd-mgr').src = base64; document.getElementById('p-ttd-mgr').style.display = "block"; }
                    }
                };
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function loadSettings() {
        db.transaction("settings").objectStore("settings").getAll().onsuccess = e => {
            e.target.result.forEach(s => {
                if(s.key === 'logo_site') { imgLogo = s.val; document.getElementById('p-logo').src = s.val; document.getElementById('p-logo').style.display = "block"; }
                if(s.key === 'ttd_user') { imgTTDUser = s.val; document.getElementById('p-ttd-user').src = s.val; document.getElementById('p-ttd-user').style.display = "block"; }
                if(s.key === 'ttd_mgr') { imgTTDMgr = s.val; document.getElementById('p-ttd-mgr').src = s.val; document.getElementById('p-ttd-mgr').style.display = "block"; }
            });
        };
    }

    function saveData() {
        const akt = document.getElementById('akt').value;
        const tglVal = document.getElementById('tgl').value;
        if(!akt || !tglVal) return alert("Mohon lengkapi Tanggal & Uraian!");
        const data = { tgl: tglVal, lok: document.getElementById('lok').value, status: document.getElementById('status').value, akt, foto: tempFoto };
        let tx = db.transaction("laporan", "readwrite");
        let store = tx.objectStore("laporan");
        const editId = document.getElementById('edit-id').value;
        if(editId) { data.id = parseInt(editId); store.put(data); }
        else { store.add(data); }
        tx.oncomplete = () => { resetForm(); refreshTable(); alert("Berhasil Disimpan!"); };
    }

    function editData(id) {
        db.transaction("laporan").objectStore("laporan").get(id).onsuccess = e => {
            const d = e.target.result;
            document.getElementById('edit-id').value = d.id;
            document.getElementById('tgl').value = d.tgl;
            document.getElementById('lok').value = d.lok;
            document.getElementById('status').value = d.status;
            document.getElementById('akt').value = d.akt;
            if(d.foto) { tempFoto = d.foto; document.getElementById('preview-img').src = d.foto; document.getElementById('preview-img').style.display = "block"; }
            document.getElementById('form-title').innerHTML = '<i class="fas fa-pen-square"></i> Update Laporan';
            document.getElementById('btn-main').innerHTML = '<i class="fas fa-sync-alt"></i> UPDATE DATA';
            document.getElementById('btn-main').className = 'btn btn-update';
            document.getElementById('btn-cancel').style.display = 'block';
            window.scrollTo(0,0);
        };
    }

    function deleteData(id) {
        if(confirm("Hapus laporan ini?")) {
            let tx = db.transaction("laporan", "readwrite");
            tx.objectStore("laporan").delete(id);
            tx.oncomplete = () => refreshTable();
        }
    }

    function clearAllData() {
        if(confirm("Hapus SEMUA riwayat laporan secara permanen?")) {
            db.transaction("laporan", "readwrite").objectStore("laporan").clear().onsuccess = () => { refreshTable(); resetForm(); };
        }
    }

    function resetForm() {
        document.getElementById('edit-id').value = "";
        document.getElementById('akt').value = "";
        document.getElementById('tgl').valueAsDate = new Date();
        document.getElementById('preview-img').style.display = "none";
        tempFoto = "";
        document.getElementById('form-title').innerHTML = '<i class="fas fa-edit"></i> Form Pekerjaan';
        document.getElementById('btn-main').innerHTML = '<i class="fas fa-save"></i> SIMPAN DATA';
        document.getElementById('btn-main').className = 'btn btn-save';
        document.getElementById('btn-cancel').style.display = 'none';
    }

    function refreshTable() {
        const table = document.getElementById('historyTable');
        const clearContainer = document.getElementById('clear-container');
        table.innerHTML = "<tr><td colspan='3' style='color:var(--text-label); padding-bottom:10px; border-bottom: 2px solid var(--border-color);'>Riwayat Laporan:</td></tr>";
        db.transaction("laporan").objectStore("laporan").getAll().onsuccess = e => {
            const res = e.target.result;
            res.sort((a, b) => new Date(b.tgl) - new Date(a.tgl));
            res.forEach(d => {
                table.innerHTML += `
                <tr style='border-bottom:1px solid var(--border-color);'>
                    <td style='padding:12px 0;'><b>${d.lok}</b><br><small>${d.tgl}</small></td>
                    <td align="center"><b>${d.status}</b></td>
                    <td align="right">
                        <i class="fas fa-trash-alt btn-delete-inline" onclick="deleteData(${d.id})"></i>
                        <i class="fas fa-pencil-alt btn-edit-inline" onclick="editData(${d.id})"></i>
                    </td>
                </tr>`;
            });
            clearContainer.innerHTML = res.length > 0 ? `<button class="btn-clear-all" onclick="clearAllData()"><i class="fas fa-eraser"></i> HAPUS SEMUA RIWAYAT</button>` : "";
        };
    }

    function generateMegaPDF() {
        document.getElementById('loading').style.display = "flex";
        db.transaction("laporan").objectStore("laporan").getAll().onsuccess = e => {
            const allData = e.target.result;
            allData.sort((a,b) => new Date(a.tgl) - new Date(b.tgl));
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');

            if(imgLogo) try { doc.addImage(imgLogo, 'PNG', 14, 10, 40, 15); } catch(err){}
            doc.setFontSize(14); doc.setTextColor(0, 84, 166); doc.setFont(undefined, 'bold');
            doc.text("SHOREBASE DAILY REPORT", 196, 18, {align:'right'});
            doc.line(14, 28, 196, 28);
            
            doc.autoTable({
                startY: 33,
                head: [['No', 'Hari & Tanggal', 'Unit', 'Uraian Pekerjaan', 'Status']],
                body: allData.map((d, i) => [i+1, formatIndo(d.tgl), d.lok, d.akt, d.status]),
                headStyles: { fillColor: [0, 84, 166], halign: 'center' },
                theme: 'grid',
                styles: { fontSize: 8 }
            });

            let ySign = doc.lastAutoTable.finalY + 15;
            if(ySign > 230) { doc.addPage(); ySign = 25; }
            doc.setFontSize(9); doc.setTextColor(0);
            doc.text("Dibuat Oleh,", 20, ySign);
            if(imgTTDUser) try { doc.addImage(imgTTDUser, 'PNG', 15, ySign + 2, 35, 15); } catch(err){}
            doc.text("SYAHRUDI", 20, ySign + 22);
            doc.text("Diketahui Oleh,", 140, ySign);
            if(imgTTDMgr) try { doc.addImage(imgTTDMgr, 'PNG', 135, ySign + 2, 35, 15); } catch(err){}
            doc.text("DEDI SISWANTO", 140, ySign + 22);

            // LAMPIRAN (6 GAMBAR PER LEMBAR)
            const fotoData = allData.filter(d => d.foto);
            if(fotoData.length > 0) {
                doc.addPage();
                doc.setFontSize(12); doc.setTextColor(0, 84, 166);
                doc.text("LAMPIRAN DOKUMENTASI", 14, 15);
                doc.line(14, 17, 196, 17);

                let xPos = [14, 108]; // Kolom
                let yPos = [25, 108, 191]; // Baris (3 Baris)
                
                fotoData.forEach((d, i) => {
                    const pageIndex = Math.floor(i / 6);
                    const itemInPage = i % 6;
                    if (i > 0 && itemInPage === 0) {
                        doc.addPage();
                        doc.text("LAMPIRAN DOKUMENTASI (Lanjutan)", 14, 15);
                        doc.line(14, 17, 196, 17);
                    }
                    const row = Math.floor(itemInPage / 2);
                    const col = itemInPage % 2;
                    try {
                        doc.addImage(d.foto, 'JPEG', xPos[col], yPos[row], 88, 65);
                        doc.setFontSize(7); doc.setTextColor(80);
                        doc.text(`${d.lok} - ${formatIndo(d.tgl)}`, xPos[col], yPos[row] + 70);
                    } catch(e){}
                });
            }

            doc.save(`Laporan_Shorebase_${Date.now()}.pdf`);
            document.getElementById('loading').style.display = "none";
        };
    }
    document.getElementById('tgl').valueAsDate = new Date();
</script>
</body>
</html>
